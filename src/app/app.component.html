<ion-app>
  <ion-split-pane contentId="main-content">
    
    <ion-menu contentId="main-content" type="overlay">
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>Menu de Vacinação</ion-title>
        </ion-toolbar>
      </ion-header>
      
      <ion-content>
        <ion-list>
          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/campanha-vacinacao" routerDirection="root">
              <ion-icon slot="start" name="megaphone-outline"></ion-icon>
              <ion-label>Campanhas Ativas</ion-label>
            </ion-item>
            <ion-item routerLink="/criancas" routerDirection="root">
              <ion-icon slot="start" name="people-outline"></ion-icon>
              <ion-label>Crianças</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>

    <div class="ion-page" id="main-content">
      <ion-router-outlet></ion-router-outlet>
    </div>

  </ion-split-pane>
</ion-app>
